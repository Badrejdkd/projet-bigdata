services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - bigdata-net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka_broker
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka_broker:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - bigdata-net

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - bigdata-net

  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "55000:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: books_dw
      MYSQL_USER: bigdata
      MYSQL_PASSWORD: bigdata123
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - bigdata-net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6450:6379"
    networks:
      - bigdata-net

  airflow-webserver:
    image: apache/airflow:2.9.0
    container_name: airflow-webserver
    ports:
      - "8082:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqlconnector://bigdata:bigdata123@mysql:3306/airflow_db
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin123
    depends_on:
      - mysql
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./scripts:/opt/airflow/scripts
      - ./scrapy_project:/opt/airflow/scrapy_project
      - ./scrapy.cfg:/opt/airflow/scrapy.cfg
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "pip install mysql-connector-python scrapy boto3 kafka-python redis && airflow webserver"
    networks:
      - bigdata-net

  airflow-scheduler:
    image: apache/airflow:2.9.0
    container_name: airflow-scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqlconnector://bigdata:bigdata123@mysql:3306/airflow_db
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    depends_on:
      - mysql
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./scripts:/opt/airflow/scripts
      - ./scrapy_project:/opt/airflow/scrapy_project
      - ./scrapy.cfg:/opt/airflow/scrapy.cfg
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "pip install mysql-connector-python scrapy boto3 kafka-python redis && airflow scheduler"
    networks:
      - bigdata-net

  streamlit:
    image: python:3.11-slim
    container_name: streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_app:/app
    command: >
      bash -c "pip install streamlit pandas mysql-connector-python plotly &&
               streamlit run /app/app.py --server.port=8501 --server.address=0.0.0.0"
    depends_on:
      - mysql
    networks:
      - bigdata-net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    ports:
      - "5050:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: bigdata
      PMA_PASSWORD: bigdata123
    depends_on:
      - mysql
    networks:
      - bigdata-net

  superset:
    image: apache/superset:3.1.0
    container_name: superset
    ports:
      - "8089:8088"
    environment:
      SUPERSET_SECRET_KEY: 'supersecretkey123'
    depends_on:
      - mysql
    networks:
      - bigdata-net

volumes:
  minio_data:
  mysql_data:

networks:
  bigdata-net:
    driver: bridge